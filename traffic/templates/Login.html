{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'styles/Login.css' %}">
</head>

<body>

<form method="post" action="{% url 'login' %}">
    {% csrf_token %}

    <h1>Login</h1>

    {% for mssg in messages %}
        <p>{{ mssg }}</p>
    {% endfor %}

    <label>User Name:</label>
    <input id="username" name="username" type="text" required>
    <br><br>

    <label>Email:</label>
    <input id="email" name="email" type="email" required>
    <br><br>

    <label>Password:</label>
    <input id="password" name="password" type="password" required>
    <br><br>

    <div style="display:grid;grid-template-columns:auto 350px;gap:10px;">
        <input id="question" name="isTraffic" type="checkbox" onclick="checkPolice()">
        <label for="question">Belongs to Traffic Dept?</label>
    </div>

    <div id="secretCode"></div>

    <br>

    <button type="submit">Login</button>

    <br><br>
    
    <a href="#">Forgot Password</a> |
    <a href="{% url 'register' %}">Register / Sign Up</a>

</form>

<script src="{% static 'scripts/Login.js' %}"></script>

</body>
</html>
